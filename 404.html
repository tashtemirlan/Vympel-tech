<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vympel Tech</title>
    <!--
      SPA fallback для GitHub Pages.
      Перенаправляет любой неизвестный путь на корень сайта, сохраняя сам путь
      в query-строке. index.html восстановит его, и go_router покажет нужную
      страницу или экран 404 — без бесконечной загрузки на вложенных путях.

      pathSegmentsToKeep = 1  → проект-сайт под /Vympel-tech/
      (если подключите свой домен в корне — поставьте 0).
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
</head>
<body></body>
</html>
